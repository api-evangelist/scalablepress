meters:
- name: product_cost
  description: Blank product (garment/accessory) cost per ordered item.
  unit: items
  aggregation: sum
  dimensions:
  - account
  - product
  - order
- name: printing_cost
  description: Decoration cost per item by print method and decoration size.
  unit: items
  aggregation: sum
  dimensions:
  - account
  - print_method
  - order
- name: shipping_cost
  description: Shipping charge per order by carrier service and destination.
  unit: shipments
  aggregation: sum
  dimensions:
  - account
  - carrier
  - order
principles:
- name: Visibility
  description: Track product, printing, and shipping cost per order and per SKU using the itemized quote and invoice data.
- name: Allocation
  description: Tag orders to storefronts, campaigns, or customers so cost of goods sold maps to internal cost centers.
- name: Optimization
  description: Compare print methods and shipping services, batch orders where possible, and negotiate high-volume rates to lower per-unit cost.
- name: Accountability
  description: Reconcile Scalable Press invoices against placed orders monthly and monitor account credit to avoid held orders.
