description: >-
  FinOps view of Scalable Press spend. There is no monthly API subscription fee.
  Cost is driven entirely by orders - each order is billed for the product
  (blank) cost plus printing (DTG, screen print, embroidery, laser engraving)
  plus shipping. Spend therefore scales with order volume, product mix, print
  method and decoration size, and chosen shipping carrier/service. Orders can be
  funded from prepaid account credit and are held when credit is insufficient.
notes: >-
  Per-unit product and printing rates are not reconciled here; use the Quote API
  to obtain authoritative itemized pricing. High-volume/wholesale rates are
  negotiated with Scalable Press. Track spend by product, print method, and
  shipping service to allocate cost of goods sold.
