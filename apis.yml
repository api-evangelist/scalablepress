aid: scalablepress
url: https://raw.githubusercontent.com/api-evangelist/scalablepress/refs/heads/main/apis.yml
name: Scalable Press
kind: company
description: >-
  Scalable Press is a technology-driven print-on-demand and fulfillment platform
  for custom apparel, accessories, and promotional products, offering DTG
  (direct-to-garment) and screen printing, embroidery, laser engraving, posters,
  and phone cases with worldwide shipping. Its public REST API lets developers
  browse a wholesale blank-and-printed product catalog, generate price quotes
  (including item, print, and shipping costs), place and manage print-and-ship
  orders, track fulfillment status through order events, create designs and
  product mockups, and retrieve billing invoices. The API uses HTTP Basic
  authentication with a private API key supplied as the password, spans v2
  (product, quote, order, design, customization, billing) and v3 (event,
  mockup) surfaces, and operates on a pay-per-order model with no monthly
  subscription fee.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Print on Demand
- Fulfillment
- Apparel
- Custom Printing
- E-Commerce
- Wholesale
created: '2026-07-11'
modified: '2026-07-11'
