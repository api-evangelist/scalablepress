actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Scalable Press's public API is
    request/response REST (v2 and v3), and order/item status is surfaced via the
    pull-based v3 Event API polled over HTTP. No AsyncAPI document was created
    because there is no documented server-push transport on Scalable Press's own
    API to model.
